version: "1.0"
agents:
  - name: extractor
    enabled: true
    provider: ollama
    model: qwen3:8b
    maxTokens: 4096
    temperature: 0
  - name: summariser
    enabled: true
    provider: ollama
    model: qwen3:8b
    maxTokens: 4096
    temperature: 0.2
  - name: structurer
    enabled: true
    provider: ollama
    model: qwen3:8b
    maxTokens: 8192
    temperature: 0
output:
  format: json
  pretty: true
